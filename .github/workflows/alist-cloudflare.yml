name: Run AList and Immich with Cloudflare Tunnel

on:
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 创建整合了 AList 和 Immich 的 docker-compose.yml 配置文件
      - name: Create Docker Compose File
        run: |
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          services:
            # --- AList 服务 ---
            alist:
              image: xhofe/alist:latest
              container_name: alist
              ports:
                - "5244:5244"
              volumes:
                - ./alist-data:/opt/alist/data
              environment:
                - PUID=0
                - PGID=0
                - UMASK=022
              restart: always

            # --- Immich 服务核心组 ---
            immich-server:
              container_name: immich_server
              image: ghcr.io/immich-app/immich-server:release
              volumes:
                - ./immich-upload:/usr/src/app/upload
                - /etc/localtime:/etc/localtime:ro
              env_file:
                - .env
              ports:
                - "2283:2283"
              depends_on:
                immich-postgres:
                  condition: service_healthy
                immich-redis:
                  condition: service_started
              restart: always

            immich-machine-learning:
              container_name: immich_machine_learning
              image: ghcr.io/immich-app/immich-machine-learning:release
              volumes:
                - ./immich-cache:/cache
              env_file:
                - .env
              restart: always

            immich-postgres:
              container_name: immich_postgres
              image: tensorchord/pgvecto-rs:pg14-v0.2.0
              environment:
                POSTGRES_PASSWORD: DB_PASSWORD_TEMPORARY
                POSTGRES_USER: postgres
                POSTGRES_DB: immich
              volumes:
                - ./immich-postgres:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -d immich -U postgres"]
                interval: 5s
                timeout: 5s
                retries: 5
              restart: always

            immich-redis:
              container_name: immich_redis
              image: redis:6.2-alpine
              restart: always

            # --- Cloudflare 穿透隧道 ---
            tunnel:
              image: cloudflare/cloudflared:latest
              container_name: cloudflared-tunnel
              restart: always
              command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
              network_mode: "host"
              depends_on:
                - alist
                - immich-server
          EOF

      # 2. 创建 Immich 专属的 .env 环境变量文件
      - name: Create Immich Env File
        run: |
          cat << 'EOF' > .env
          DB_PASSWORD=DB_PASSWORD_TEMPORARY
          DB_USERNAME=postgres
          DB_DATABASE_NAME=immich
          DB_HOSTNAME=immich-postgres
          IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
          EOF

      # 3. 启动所有 Docker 容器
      - name: Start Services and Cloudflare Tunnel
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          docker compose up -d
          echo "正在等待所有服务完成基础初始化..."
          sleep 15

      # 4. 下载加密的 JSON 备份文件并导入到 AList（核心步骤）
      - name: Fetch and Restore Encrypted JSON Config
        env:
          CONFIG_URL: ${{ secrets.ALIST_CONFIG_URL }}
          BACKUP_PASS: ${{ secrets.ALIST_BACKUP_PASSWORD }}
          LOGIN_PASS: ${{ secrets.PASS }}
          
          DATA_URL: ${{ secrets.DATA_URL }}
          DATA_PASS: ${{ secrets.DATA_PASS }}
        run: |
          echo "正在从远程 URL 下载加密的 JSON 备份文件..."
          # 下载并存放到 AList 挂载目录下，方便容器读取
          #curl -L "$CONFIG_URL" -o ./backup.json
          
          curl -L "$DATA_URL" -o ./data.zip
          
          if [ -s ./data.zip ]; then
            echo "备份文件下载成功，正在执行解密导入..."
            
            # 使用 AList 自带的 admin 导入指令 
            # 语法：alist admin import <文件路径> <解密密码>
            # -v 参数用于指定覆盖冲突模式（1 代表覆盖现有存储）
            # 2. 修正：利用 docker cp 命令强行将文件推送到容器的内部路径
            docker exec alist ./alist stop
            
            rm -rf /opt/alist/data
            mkdir -p /opt/alist/data
            
            unzip -P $DATA_PASS ./data.zip -d /opt/alist/data
            
            docker exec alist ./alist restart
            
            docker exec alist ./alist admin set "$LOGIN_PASS"
            
            #docker cp ./backup.json alist:/opt/alist/data/backup.json
            
            #docker exec alist ./alist admin import /opt/alist/data/backup.json "$BACKUP_PASS"
            
         
            
            echo "配置恢复完成！"
            
            # 临时清理掉容器外的物理 json 文件防止泄露
           
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
          fi

          echo "========================================="
          echo "正在强制重置/同步最终登录管理员密码..."
          
          
          
          echo "========================================="
          
          # 检查容器状态
          docker compose ps

      # 5. 保持工作流运行
      - name: Keep Workflow Alive
        run: |
          echo "=================================================="
          echo "AList 已成功解密并恢复 JSON 配置！"
          echo "AList 和 Immich 服务已全部就绪。"
          echo "=================================================="
          while true; do sleep 60; done