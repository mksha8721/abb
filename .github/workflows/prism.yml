name: Run AList and Tunnel Photoprism

on:
  workflow_dispatch: # 支持手动点击触发

jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ================= 【缓存优化 1：APT 包管理器缓存】 =================
      - name: Cache APT Packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-rclone-fuse3

      - name: Install Dependencies (unzip, rclone, fuse3)
        run: |
          sudo apt-get update
          # 如果缓存命中了，apt 会直接从本地归档目录极速安装，不再走公网下载
          sudo apt-get install -y unzip rclone fuse3 expect
          
          sudo mkdir -p /alist

      # ================= 【缓存优化 2：Docker 镜像层缓存】 =================
      - name: Cache Docker Layers
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-images-${{ hashFiles('docker-compose.yml') }}
          restore-keys: |
            ${{ runner.os }}-docker-images-

  
      # ================= 【镜像载入/预拉取加速】 =================
      - name: Load Cached Docker Images
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          echo "检测到 Docker 镜像缓存，正在从本地导入..."
          if [ -f /tmp/.buildx-cache/images.tar ]; then
            docker load -i /tmp/.buildx-cache/images.tar
          fi
          
      - name: Reatore lucky
        env:
          LUCKY: ${{ secrets.LUCKY }}
          DATA_PASS: ${{ secrets.DATA_PASS }}
          LOGIN_PASS: ${{ secrets.PASS }}
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          curl -L "$LUCKY" -o ./lucky.zip
          mkdir -p  ./lucky 
          
          if [ -s ./lucky.zip ]; then
            echo "lucky文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            sudo unzip -P "$DATA_PASS" ./lucky.zip -d ./lucky
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi
          rm -f ./lucky.zip

      - name: Install 1Panel
        run: |
          curl -sSL https://resource.fit2cloud.com/1panel/package/quick_start.sh | sudo bash
          
  

      - name: Install mariadb
        env:
         
          MYSQL: ${{ secrets.MYSQL }}
          DATA_PASS: ${{ secrets.DATA_PASS }}
          LOGIN_PASS: ${{ secrets.PASS }}
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."

          sudo curl -L "$MYSQL" -o ./mysql.zip
          
          if [ -s ./mysql.zip ]; then
            echo "mysql文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            sudo unzip -P "$DATA_PASS" ./mysql.zip -d ./
           
            sudo chmod -R 777 ./mariadb
           
            cd ./mariadb/mariadb
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi  
          
          sudo rm -f ./mysql.zip
          
      - name: Install Photoprism
        env:
          PRISM: ${{ secrets.PRISM }}
         
          DATA_PASS: ${{ secrets.DATA_PASS }}
          LOGIN_PASS: ${{ secrets.PASS }}
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          
          sudo curl -L "$PRISM" -o ./prism.zip
         
          
          if [ -s ./prism.zip ]; then
            echo "prism文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            sudo unzip -P "$DATA_PASS" ./prism.zip -d ./
            
            sudo chmod -R 777 ./photoprism
            
            cd ./photoprism/photoprism
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi
          
          sudo rm -f ./prism.zip


      - name: Pull and Save Docker Images (If Cache Miss)
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          echo "无缓存，正在从网络全量拉取 Docker 镜像..."
          
          docker compose pull
          mkdir -p /tmp/.buildx-cache
          # 将拉取下来的所有大镜像打包归档到缓存目录中
          docker save $(docker compose config | grep 'image:' | awk '{print $2}' | sort | uniq) -o /tmp/.buildx-cache/images.tar

      # 3. 启动所有 Docker 容器
      - name: Start Services and Cloudflare Tunnel
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
         
          
          docker compose up -d
          echo "正在等待所有服务完成基础初始化..."
          sleep 5 # 已经有了后面的死循环检测，这里可以把死等的 15s 缩短到 5s 节约时间


      # 4. 下载物理 data.zip 备份并无损解压还原
      - name: Fetch and Restore Encrypted JSON Config
        env:
          DATA_URL: ${{ secrets.DATA_URL }}
          DATA_PASS: ${{ secrets.DATA_PASS }}
          LOGIN_PASS: ${{ secrets.PASS }}
  
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          curl -L "$DATA_URL" -o ./data.zip
          
          if [ -s ./data.zip ]; then
            echo "备份文件下载成功，正在执行覆盖解压..."
            
            
            docker compose stop alist
            
           
            echo "3. 清理宿主机空挂载目录，并直接解压物理备份到挂载点..."
            sudo rm -rf ./alist-data
            sudo mkdir -p ./alist-data
            
            # 使用前面已经安装/缓存好的解压命令
            sudo unzip -P "$DATA_PASS" ./data.zip -d ./alist-data
            
            echo "5. 重新拉起 AList 容器，无缝加载刚刚恢复的物理数据库..."
            
           
            docker compose start alist
            
            echo "6. 强制同步最终登录管理员密码..."
            docker exec alist /opt/alist/alist admin set "$LOGIN_PASS"
            echo "配置物理恢复完成！"         
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi
          
         
          sudo rm -f ./data.zip


      - name: Enable SSHD and set root password
        run: |
          echo "root:Monchan" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Configure 1Panel admin
        env:
          USER: ${{ secrets.PANELUSER }}
          DATA_PASS: ${{ secrets.DATA_PASS }}
          LOGIN_PASS: ${{ secrets.PASS }}
          
        run: |
        
          #sudo 1pctl user-info
          
          #echo "$USER" | sudo 1pctl update username
          
          #sudo expect -c "spawn 1pctl update password; expect \"Update panel password:\"; send \"${LOGIN_PASS}\r\"; expect \"Confirm password:\"; send \"${LOGIN_PASS}\r\"; expect eof"
          
          #echo "20333" | sudo 1pctl update port
          
      - name: Mount alist
        env:
         
          RCLONECONF: ${{ secrets.RCLONECONF }}
 
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."

          sudo curl -L "$RCLONECONF" -o ./rclone.conf
          
          if [ -s ./rclone.conf ]; then
            echo "rclone.conf文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            
            sudo mkdir -p /home/runner/.config/rclone
           sudo mkdir -p /root/.config/rclone
           
            sudo cp ./rclone.conf /home/runner/.config/rclone/rclone.conf
            
            sudo cp ./rclone.conf /root/.config/rclone/rclone.conf
            
            
            sudo rclone mount mohic:/ /alist --cache-dir /tmp --vfs-cache-mode full  --allow-other  --daemon
            
            sleep 3
            
            docker restart 1Panel-photoprism-B415
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi  
          
          sudo rm -f ./rclone.conf
          
      - name: Install Immich
        env:
          IMMICH: ${{ secrets.IMMICH }}
         
          DATA_PASS: ${{ secrets.DATA_PASS }}
          
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          
          sudo mkdir -p /immich
          
          sudo curl -L "$IMMICH" -o ./immich.zip
         
          
          if [ -s ./immich.zip ]; then
            echo "immich文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            sudo unzip -P "$DATA_PASS" ./immich.zip -d ./
           
            sudo rm -f ./immich.zip
         
            sudo chmod -R 777 ./immich-app
            
           # sudo cp -r ./immich-app /root
            
            cd ./immich-app
            
            docker compose up -d
            
            
            sudo gunzip -c $(ls -t /alist/immich/backups/*.sql.gz | head -n 1) \
              | docker exec -i immich_postgres psql -U postgres -d immich
            
            docker restart immich_server
            
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi
          
          
      - name: Restore 1Panel
        run: |
          
          echo "清理旧文件..."
            
          # 使用前面已经安装/缓存好的解压命令
          sudo 1pctl stop 
            
            
          sudo rm -rf /opt/1panel
            
          echo "复制备份文件..."
            
          sudo cp -r /alist/back/1panel /opt
            
          sudo 1pctl start
            
            
            
      - name: Restore file
        run: |
          
          echo "复制新文件..."
          
          # 使用前面已经安装/缓存好的解压命令
          sudo cp -r /alist/back/root/  /
            
      - name: Restore alist
        env:
          DATA_PASS: ${{ secrets.DATA_PASS }}
        run: |
          
          if [ -s /alist/back/data.zip ]; then
          echo "备份文件存在，正在执行覆盖解压..."
            
            
          docker compose stop alist
            
           
          echo "3. 清理宿主机空挂载目录，并直接解压物理备份到挂载点..."
          sudo rm -rf ./alist-data
          sudo mkdir -p ./alist-data
            
          # 使用前面已经安装/缓存好的解压命令
          sudo unzip -P "$DATA_PASS" /alist/back/data.zip -d ./alist-data
            
          echo "5. 重新拉起 AList 容器，无缝加载刚刚恢复的物理数据库..."
            
           
          docker compose start alist
            
          
          echo "配置物理恢复完成！"         
          else
            echo "错误：加密备份文件不存在，无法执行恢复！"
            exit 1
          fi
     
      - name: Install tailscale
        env:
         
          TAIL: ${{ secrets.TAIL }}
 
        run: |
          echo "正在从远程 URL 安装Tailscale..."
          
          sudo curl -fsSL https://tailscale.com/install.sh | sh
          
          # sudo tailscale up --authkey=$TAIL
          
          sudo tailscale up --authkey=$TAIL --hostname=my-server
          
          sudo tailscale status
          
                   
          
      # 6. 保持工作流运行
      - name: Keep Workflow Alive
        run: |
          echo "=================================================="
          echo "【极速启动成功】所有服务、网络及物理挂载均已就绪！"
          echo "=================================================="
          while true; do sleep 60; done