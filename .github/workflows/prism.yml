name: Run prism555

permissions:
  actions: write 
  
on:
  #schedule:
    #- cron: "5 16 * * *"
  repository_dispatch:
    types: [mksha_trigger]
    
  workflow_dispatch: # 支持手动点击触发
 
jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
    
      # 1. 签出仓库 B
      - name: Checkout Repo B
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNCTOKEN }} # 记得去 Settings 开启 Read and write permissions
    
      # 【核心安全机制】判断当前运行的仓库是否为主仓库
      - name: Check and Sync Repository
        env:
          TOKEN: ${{ secrets.SYNCTOKEN }} 
          
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
        run: |
          echo "当前运行的仓库是: ${{ github.repository }}"
          
          # ==================================================
          # 1. 🛡️ 安全防御：如果是主仓库本身，直接退出
          # ==================================================
          if [ "${{ github.repository }}" = "Metamask-ctrl/alist" ]; then
            echo "=================================================="
            echo "🛡️ 安全防御：检测到当前正是【主仓库本身】，无需执行同步！"
            echo "正在安全退出..."
            echo "=================================================="
            exit 0
          fi

          echo "=================================================="
          echo "🎯 确认身份：当前为【B 仓库】，开始检查更新..."
          echo "=================================================="
        
          # 配置 Git 机器人信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 绑定主仓库并拉取最新状态
          git remote add upstream https://github.com/Metamask-ctrl/alist.git
          git fetch upstream
          
          # ==================================================
          # 3. 🔍 核心判定：对比本地与主仓库的 Commit ID
          # ==================================================
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          
          echo "当前 B 仓库最新 Commit: $LOCAL_COMMIT"
          echo "主仓库 A 最新 Commit:   $UPSTREAM_COMMIT"
          
          if [ "$LOCAL_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "=================================================="
            echo "☕ 检查完毕：当前已经是最新版本，无任何更新，无需同步。"
            echo "=================================================="
            exit 0 # 正常结束任务，不执行后面的同步代码
          fi

          # ==================================================
          # 4. 🚀 执行同步：只有不一致时才会走到这里
          # ==================================================
          echo "=================================================="
          echo "📢 检测到主仓库有新更新！正在强行同步..."
          echo "=================================================="
          
          # 强制覆盖本地 main 分支
          git checkout main
          git reset --hard upstream/main
          
          # 推送到自己的仓库 B（需配合你在上一步配置的 MY_SYNC_TOKEN）
          git push origin main --force
          
          echo "=================================================="
          echo "🎉 恭喜！新更新已成功同步到当前 B 仓库！"
            
          #重新触发当前任务
          
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/mksha8721/abb/dispatches" \
              -d '{"event_type": "mksha_trigger"}')

          echo "GitHub API 响应状态码: $HTTP_STATUS"
              
          # GitHub 触发成功的标准状态码是 204
          if [ "$HTTP_STATUS" -eq 204 ]; then
            echo "=================================================="
            echo "🎉【触发成功】API 请求已成功送达，目标工作流已启动！"
            echo "=================================================="
            cat response.json 2>/dev/null || true
          else
            echo "=================================================="
            echo "❌【触发失败】API 请求返回异常！请检查 Token 或 URL 配置。"
            echo "错误响应内容如下："
            echo "=================================================="
            cat response.json
                exit 1 # 触发失败时，强行中断并让当前 Action 报错显红
          fi
          
          #退出当前任务
          gh run cancel ${{ github.run_id }}


          
      # ================= 【缓存优化 1：APT 包管理器缓存】 =================
      - name: Cache APT Packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-rclone-fuse3-expect
          
        
          

      - name: Install Dependencies (unzip, rclone, fuse3)
        run: |
          sudo apt-get update
          # 如果缓存命中了，apt 会直接从本地归档目录极速安装，不再走公网下载
          sudo apt-get install -y unzip rclone fuse3 expect
          
          #sudo mkdir -p /alist
          
          
          


      - name: Pull Docker Images

        run: |
          echo "=== 运行期状态调试 ==="
          echo "通过 env 接收到的缓存状态为: '$MY_CACHE_HIT'"
          
          echo "正在拉取 Docker 镜像..."
          docker compose -f ./docker-compose1.yml pull

          

      - name: Mount s3
        env:
         
          RCLONECONF: ${{ secrets.RCLONECONF }}
 
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."

          sudo curl -L "$RCLONECONF" -o ./rclone.conf
          
          if [ -s ./rclone.conf ]; then
            echo "rclone.conf文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            
            sudo mkdir -p /home/runner/.config/rclone
            sudo mkdir -p /root/.config/rclone
           
            sudo cp ./rclone.conf /home/runner/.config/rclone/rclone.conf
            
            sudo cp ./rclone.conf /root/.config/rclone/rclone.conf
            
            #sleep 3
            
            #sudo rm -r /alist/r2
            
            sudo mkdir -p /alist
            
            sudo mkdir -p /r2
            
            sudo rclone mount r2:action /r2 --cache-dir /tmp --vfs-cache-mode full  --allow-other  --daemon
            
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi  
          
          sudo rm -f ./rclone.conf
          
          
                    

      - name: Install 1Panel
        run: |
          curl -sSL https://resource.fit2cloud.com/1panel/package/quick_start.sh | sudo bash
          
      
          
      - name: Restore 1Panel
        env:
          #PANEL: ${{ secrets.PANEL }}
          DATA_PASS: ${{ secrets.DATA_PASS }}
          
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."

          sudo cp /r2/back/panel.zip ./
          
          if [ -s ./panel.zip ]; then
            echo "panel文件下载成功，正在执行覆盖解压..."
            
            # 使用前面已经安装/缓存好的解压命令
            sudo 1pctl stop 
            
            sudo unzip -P "$DATA_PASS" ./panel.zip -d ./
           
            sudo chmod -R 777 ./1panel
           
            sudo rm -rf /opt/1panel
            
            sudo cp -r ./1panel /opt
            
            sudo 1pctl start
            
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            exit 1
          fi  
          
          sudo rm -f ./panel.zip



      # 3. 启动所有 Docker 容器
      - name: Start Services and Cloudflare Tunnel
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
         
          
          docker compose up -d
          
          echo "正在等待所有服务完成基础初始化..."
          #sleep 5 # 已经有了后面的死循环检测，这里可以把死等的 15s 缩短到 5s 节约时间


      # 4. 下载物理 data.zip 备份并无损解压还原
      - name: Restore alist
        env:
          #DATA_URL: ${{ secrets.DATA_URL }}
          #LOGIN_PASS: ${{ secrets.PASS }}
          #CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          DATA_PASS: ${{ secrets.DATA_PASS }}

          
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          #curl -L "$DATA_URL" -o ./data.zip
          sudo cp /r2/back/data.zip ./
          
          if [ -s ./data.zip ]; then
            echo "备份文件下载成功，正在执行覆盖解压..."
            
            
            docker stop alist
            
           
            echo "3. 清理宿主机空挂载目录，并直接解压物理备份到挂载点..."
            sudo rm -rf ./alist-data
            #sudo mkdir -p ./alist-data
            
            # 使用前面已经安装/缓存好的解压命令
            sudo unzip -P "$DATA_PASS" ./data.zip -d ./
            
            
            sudo chmod -R 777 ./alist-data
            
            
            echo "5. 重新拉起 AList 容器，无缝加载刚刚恢复的物理数据库..."
            
           
            docker start alist
            
            echo "6. 强制同步最终登录管理员密码..."
            #docker exec alist /opt/alist/alist admin set "$LOGIN_PASS"
            echo "配置物理恢复完成！"         
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            
          fi
          
         
          sudo rm -f ./data.zip


      - name: Enable SSHD and set root password
        run: |
          export MY_VAR=$(cat /r2/back/tmp)
          echo "root:$MY_VAR" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
       
      - name: Mount alist
        #env:
          #RCLONECONF: ${{ secrets.RCLONECONF }}
        run: |
            
            sudo rclone mount mohic:/ /alist --cache-dir /tmp --vfs-cache-mode full  --allow-other  --daemon
            
          
          
          
      - name: Install mariadb
        #env:
          #MYSQL: ${{ secrets.MYSQL }}
          #DATA_PASS: ${{ secrets.DATA_PASS }}
          #LOGIN_PASS: ${{ secrets.PASS }}
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          
          #sudo curl -L "$PRISM" -o ./prism.zip
          
          cd /opt/1panel/apps/mariadb/mariadb1
          
          
          if [ -s ./docker-compose.yml ]; then
            echo "prism文件下载成功，正在执行覆盖解压..."
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            
          fi
 
            
 

      - name: Install Photoprism
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
          
          #sudo curl -L "$PRISM" -o ./prism.zip
          
          cd /opt/1panel/apps/photoprism/photoprism
          
          #sudo mv .env.txt .env
          
          if [ -s ./docker-compose.yml ]; then
            echo "prism文件下载成功，正在执行覆盖解压..."
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            
          fi
          
          echo  "Restore Photoprism sql..."
         
          #docker stop photoprism
          
          #sudo cp /r2/back/photoprism.sql ./
          
          #docker exec -i 1Panel-mariadb-rh6u  mariadb -u root -pmariadb_yd6bBF photoprism_z6sizw < ./photoprism.sql
          
          #docker start photoprism
          
          #sudo rm -f ./photoprism.sql
          
          #sudo rm -f ./prism.zip
          
 
      - name: Install meilisearch
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
        
          
          cd /opt/1panel/apps/meilisearch/meilisearch
          
          
          if [ -s ./docker-compose.yml ]; then
            echo "prism文件下载成功，正在执行覆盖解压..."
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            
          fi
 
 
      - name: Install rustdesk
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
        
          
          cd /opt/1panel/apps/rustdesk/rustdesk
          
          
          if [ -s ./docker-compose.yml ]; then
            echo "prism文件下载成功，正在执行覆盖解压..."
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            
          fi
 
 
            
      - name: Restore file
        run: |
          
          echo "复制新文件..."
          
          # 使用前面已经安装/缓存好的解压命令
          sudo cp -r /r2/back/root/  /
          
          #sudo cp /r2/back/shadow /etc
          
          #sudo awk -v newroot="$(cat /r2/back/shadow)" 'BEGIN{FS=OFS=":"}$1=="root"{print newroot;next}{print}' /etc/shadow | sudo tee /etc/shadow >/dev/null
                   
       
      

      - name: Configure 1Panel admin
        run: |
        
          #sudo 1pctl user-info
          
          #echo "$USER" | sudo 1pctl update username
          
          #sudo expect -c "spawn 1pctl update password; expect \"Update panel password:\"; send \"${LOGIN_PASS}\r\"; expect \"Confirm password:\"; send \"${LOGIN_PASS}\r\"; expect eof"
          
          #echo "20333" | sudo 1pctl update port
          
  
         
      - name: Install Immich
          
        run: |
          echo "正在从远程 URL 下载加密的物理备份压缩包..."
 
          
          cd /opt/1panel/apps/immich-app 
          
          
          if [ -s ./docker-compose.yml ]; then
            echo "Immich文件下载成功，正在执行覆盖解压..."
            
            docker compose up -d
            
          else
            echo "错误：加密备份文件下载失败或为空，无法执行恢复！"
            
          fi

    
    
    
            
      - name: Install tailscale
        env:
         
          TAIL: ${{ secrets.TAIL }}
 
        run: |
          echo "正在从远程 URL 安装Tailscale..."
          sudo mkdir -p /var/lib/tailscale
          
          sudo cp /alist/r2/tailscaled.state  /var/lib/tailscale
          
          
          sudo curl -fsSL https://tailscale.com/install.sh | sh
          
          sudo nohup tailscaled --state=/var/lib/tailscale/tailscaled.state >/dev/null 2>&1 &
         
          # sudo tailscale up --authkey=$TAIL
          
          #sleep 3

          echo "Running tailscale up..."
          
          sudo tailscale up \
            --authkey=${{ secrets.TAIL }} \
            --hostname=github-actions-runner \
            --accept-routes \
            --accept-dns=false
          
          sudo tailscale status
          
          
        # 6. 保持工作流运行
      #- name: Restore Immich
        #run: |
          

          #echo "恢复immich..."
          
          #sudo gunzip -c $(ls -t /alist/immich/backups/*.sql.gz | head -n 1) | docker exec -i immich_postgres psql -U postgres -d immich
            
          #docker restart immich_server
                   
      # 6. 保持工作流运行
      - name: Keep Workflow Alive
        env:
          TOKEN: ${{ secrets.TOKEN }} 
          GH_URL: ${{ secrets.GH_URL }} 
        run: |
          echo "=================================================="
          echo "【极速启动成功】所有服务、网络及物理挂载均已就绪！"
          echo "=================================================="
          
          # 1. 设置时间（5小时55分钟 = 21300秒）
          #DURATION=21300 
          
          DURATION=300 
          
          
          
          START_TIME=$(date -u +%s)
          END_TIME=$((START_TIME + DURATION))
          
          echo "工作流启动时间 (UTC): $(date -u -d @$START_TIME '+%Y-%m-%d %H:%M:%S')"
          
          echo "预计结束时间 (UTC): $(date -u -d @$END_TIME '+%Y-%m-%d %H:%M:%S')"
          echo "=================================================="

          while true; do
            CURRENT_TIME=$(date -u +%s)
            
            # 如果当前时间超过或等于预计结束时间，则退出循环
            if [ $CURRENT_TIME -ge $END_TIME ]; then
              echo "=================================================="
              echo "即将退出..."
              echo "=================================================="
              
              # 通过 -w 获取 HTTP 状态码，并用 -s 隐藏进度条
              HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$GH_URL" \
                -d '{"event_type": "mksha_trigger"}')

              echo "GitHub API 响应状态码: $HTTP_STATUS"
              
              # GitHub 触发成功的标准状态码是 204
              if [ "$HTTP_STATUS" -eq 204 ]; then
                echo "=================================================="
                echo "🎉【触发成功】API 请求已成功送达，目标工作流已启动！"
                echo "=================================================="
                cat response.json 2>/dev/null || true
              else
                echo "=================================================="
                echo "❌【触发失败】API 请求返回异常！请检查 Token 或 URL 配置。"
                echo "错误响应内容如下："
                echo "=================================================="
                cat response.json
                exit 1 # 触发失败时，强行中断并让当前 Action 报错显红
              fi
              sleep 30

              break
            fi
            
            sleep 30
          done
