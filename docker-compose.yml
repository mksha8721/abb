version: '3.8'
services:
  alist:
    image: xhofe/alist:latest
    container_name: alist
    ports:
      - "5244:5244"
    volumes:
      - ./alist-data:/opt/alist/data
      - /home:/mnt/home
    environment:
      - PUID=0
      - PGID=0
      - UMASK=022
    restart: always


  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    network_mode: "host"
    depends_on:
      - alist
